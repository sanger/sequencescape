---

# To order the config, run: bundle exec ruboclean --preserve-comments

inherit_from:
- ".rubocop_todo.yml"

inherit_gem:
  test-prof: config/rubocop-rspec.yml

inherit_mode:
  merge:
  - Exclude

plugins:
- rubocop-capybara
- rubocop-factory_bot
- rubocop-minitest
- rubocop-performance
- rubocop-rails
- rubocop-rspec
- rubocop-rspec_rails
- test-prof

# env.rb and cucumber.rake are generated by cucumber-rails
AllCops:
  NewCops: enable
  Exclude:
  - db/schema.rb
  - db/views_schema.rb
  - features/support/env.rb
  - lib/tasks/cucumber.rake
  - bin/*
  - node_modules/**/*
  - tmp/**/*

Rails:
  Enabled: true

# Capybara
Capybara/ClickLinkOrButtonStyle:
  Enabled: false

# Factory Bot
FactoryBot/FactoryAssociationWithStrategy:
  Enabled: false

Layout/DefEndAlignment:
  EnforcedStyleAlignWith: def

Layout/EmptyLineAfterMagicComment:
  Enabled: false

Layout/EndAlignment:
  EnforcedStyleAlignWith: start_of_line

Layout/LeadingCommentSpace:
  AllowRBSInlineAnnotation: true

Layout/MultilineMethodCallIndentation:
  EnforcedStyle: indented

Layout/MultilineOperationIndentation:
  EnforcedStyle: indented

# Step definitions are defined with Given /regex/ do ...
# There is little ambiguity here, and brackets just break convention
Lint/AmbiguousRegexpLiteral:
  Exclude:
  - features/support/step_definitions/**/*

# Unused keyword arguments are good for maintaining API compatibility, and
# applying an underscore before the keyword name breaks that API.
Lint/UnusedMethodArgument:
  AllowUnusedKeywordArguments: true

# Blocks are used to structure tests and are part of the shoulda dsl.
# The standard BlockLength limits are too stringent for this purpose.
# Block DSL is also used in routes
# We should be careful keeping rake tasks here, as large tasks are still an issue.
# Not sure if we need to split namespaces across several files though.
# We exclude builders, as they are concerned with rendering xml
Metrics/BlockLength:
  Exclude:
  - Gemfile
  - db/seeds/**/*
  - "**/*.builder"
  CountAsOne:
  - array
  - hash
  - heredoc
  AllowedMethods:
  - describe
  - context
  - background
  - scenario
  - namespace
  - task
  - included
  - shared_context
  - shared_examples
  - shared_examples_for
  - state_machine
  - configure
  - draw
  - feature
  - subject
  - let
  - let!
  - factory
  - define
  - guard
  - transient
  - with_nested_has_many_association
  - with_association
  - it
  - class_eval
  - has_metadata
  - resources
  - aasm
  - redefine_aasm
  - model
  - step

# Disable for features and tests, we want lots of tests
Metrics/ClassLength:
  inherit_mode:
    merge:
    - Exclude
  CountAsOne:
  - array
  - hash
  - heredoc
  Exclude:
  - spec/**/*
  - test/**/*

# Method length limits make little sense when you are describing a table schema or a view.
Metrics/MethodLength:
  Exclude:
  - db/migrate/*
  CountAsOne:
  - array
  - hash
  - heredoc

# There is so much existing inconsistent code that it is not worth enforcing this cop
Naming/PredicateMethod:
  Enabled: false

# Aggregate examples can be useful, but the cop gets into nasty battles with
# other Spec cops, and is only really of value in expensive tests.
RSpec/AggregateExamples:
  Enabled: false

# Added exclude because api and feature specs do not have a specific class.
RSpec/DescribeClass:
  Exclude:
  - spec/requests/**/*.rb
  - spec/api/**/*.rb
  - spec/features/**/*.rb
  - spec/views/**/*.rb

# Disable for features, as we might want to step through long processes
RSpec/ExampleLength:
  inherit_mode:
    merge:
    - Exclude
  CountAsOne:
  - array
  - hash
  - heredoc
  Exclude:
  - spec/features/**/*

# We want to be able to use `it do ... end` as well as `it { is_expected.to ... }`
RSpec/ImplicitSubject:
  EnforcedStyle: single_statement_only

# Due to the nature of our application, this doesn't add value to our tests
RSpec/IndexedLet:
  Enabled: false

RSpec/MultipleExpectations:
  Exclude:
  - spec/features/**/*

# We don't see a benefit to limiting the number of memoized helpers.
RSpec/MultipleMemoizedHelpers:
  Enabled: false

# Set a more reasonable max. We've been happy with our existing nesting.
RSpec/NestedGroups:
  Max: 6

RSpecRails/AvoidSetupHook:
  Exclude:
  - test/**/*

# We have a few custom find_by methods which we maintain.
# At least for now. find_by_id_or_name is a bit clunky.
Rails/DynamicFindBy:
  Exclude:
  - app/sample_manifest_excel/**/*
  AllowedMethods:
  - find_by_sql
  - find_by_id_or_name
  - find_by_id_or_name!
  - find_by_barcode

# Not planning to internationalise the app, so this is not relevant
Rails/I18nLocaleTexts:
  Enabled: false

# Explicit if statements are clearer than chaining with the safe navigation operator
# particularly where there is a behavioural impact
Rails/Presence:
  Enabled: false

# This seems to be causing all sorts of issues with failing tests
Rails/RedundantPresenceValidationOnBelongsTo:
  Enabled: false

Rails/SkipsModelValidations:
  Exclude:
  - db/migrate/*.rb
  - features/support/step_definitions/*.rb

Rails/UniqueValidationWithoutIndex:
  Enabled: false

Rails/UnknownEnv:
  Environments:
  - production
  - development
  - test
  - cucumber
  - profile
  - staging

Style/ClassAndModuleChildren:
  Enabled: false

# This cop doesn't always increase clarity
Style/CollectionQuerying:
  Enabled: false

Style/Documentation:
  Enabled: false

# The single-line syntax can be clearer than the multi-line version for multiple definitions
Style/EmptyClassDefinition:
  Enabled: false

Style/EmptyMethod:
  EnforcedStyle: expanded

# Only use shorthand hash syntax when all keys match the variables for better readability
Style/HashSyntax:
  EnforcedShorthandSyntax: consistent

# Enforces 1234565789 as 123_456_789: While nice when dealing with actual big
# numbers, we're more likely to see it shout at us about barcodes.
Style/NumericLiterals:
  Enabled: false

# these are generally generated files and don't need excessive linting
Style/QuotedSymbols:
  Exclude:
  - bin/*

# these are generally generated files and don't need excessive linting
Style/StringLiterals:
  Exclude:
  - bin/*
